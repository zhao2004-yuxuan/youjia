<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>狼爸辅导班 - 2026暑期招生</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 60px 30px;
            text-align: center;
            color: white;
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: float 20s linear infinite;
        }

        @keyframes float {
            0% {
                transform: translate(0, 0);
            }
            100% {
                transform: translate(50px, 50px);
            }
        }

        .header-content {
            position: relative;
            z-index: 1;
        }

        .header-badge {
            display: inline-block;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 15px;
            backdrop-filter: blur(10px);
            animation: fadeInDown 0.8s ease-out;
        }

        .header-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 10px;
            letter-spacing: 2px;
            animation: fadeInDown 0.8s ease-out 0.1s both;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header-subtitle {
            font-size: 18px;
            font-weight: 300;
            opacity: 0.95;
            letter-spacing: 1px;
            animation: fadeInUp 0.8s ease-out 0.2s both;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .nav-container {
            padding: 40px 20px;
        }

        .nav-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .nav-item {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 15px;
            padding: 30px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
            position: relative;
            overflow: hidden;
            animation: scaleIn 0.6s ease-out;
        }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .nav-item:nth-child(1) { animation-delay: 0.1s; }
        .nav-item:nth-child(2) { animation-delay: 0.2s; }
        .nav-item:nth-child(3) { animation-delay: 0.3s; }
        .nav-item:nth-child(4) { animation-delay: 0.4s; }

        .nav-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s ease;
        }

        .nav-item:hover::before {
            left: 100%;
        }

        .nav-item:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 35px rgba(102, 126, 234, 0.3);
            border-color: #667eea;
        }

        .nav-item.schedule {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .nav-item.courses {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }

        .nav-item.homework {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
        }

        .nav-item.teachers {
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
            color: white;
        }

        .nav-icon {
            font-size: 40px;
            margin-bottom: 12px;
            display: block;
            transition: transform 0.3s ease;
        }

        .nav-item:hover .nav-icon {
            transform: scale(1.2) rotate(10deg);
        }

        .nav-text {
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .features {
            background: #f8f9fa;
            padding: 25px 20px;
            border-top: 1px solid #eee;
        }

        .features-title {
            font-size: 14px;
            font-weight: 700;
            color: #333;
            margin-bottom: 15px;
            text-align: center;
        }

        .feature-list {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .feature-item {
            background: white;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-size: 12px;
            color: #666;
            border: 1px solid #eee;
            transition: all 0.3s ease;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .feature-item:hover {
            border-color: #667eea;
            color: #667eea;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.1);
            transform: translateY(-2px);
        }

        .feature-icon {
            font-size: 20px;
            margin-bottom: 6px;
        }

        .contact-section {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px 20px;
            text-align: center;
        }

        .contact-title {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .contact-info {
            font-size: 13px;
            line-height: 1.8;
            opacity: 0.95;
        }

        .contact-item {
            margin-bottom: 8px;
            transition: all 0.3s ease;
        }

        .contact-item:hover {
            transform: translateX(5px);
        }

        .contact-icon {
            margin-right: 6px;
        }

        .footer {
            background: #f8f9fa;
            padding: 20px;
            text-align: center;
            color: #999;
            font-size: 12px;
            border-top: 1px solid #eee;
        }

        .scroll-indicator {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateX(-50%) translateY(0);
            }
            50% {
                transform: translateX(-50%) translateY(-10px);
            }
        }

        @media (max-width: 480px) {
            .header-title {
                font-size: 24px;
            }

            .header-subtitle {
                font-size: 16px;
            }

            .nav-item {
                padding: 25px 15px;
            }

            .nav-icon {
                font-size: 35px;
            }

            .nav-text {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-content">
                <div class="header-badge">🎓 2026年暑期班</div>
                <div class="header-title">优佳辅导班</div>
                <div class="header-subtitle">专业教学 · 用心服务</div>
            </div>
        </div>

        <div class="nav-container">
            <div class="nav-grid">
                <div class="nav-item schedule" onclick="navigateTo('schedule')">
                    <span class="nav-icon">📅</span>
                    <div class="nav-text">开课时间</div>
                </div>
                <div class="nav-item courses" onclick="navigateTo('courses')">
                    <span class="nav-icon">📚</span>
                    <div class="nav-text">课程安排</div>
                </div>
                <div class="nav-item homework" onclick="navigateTo('homework')">
                    <span class="nav-icon">✏️</span>
                    <div class="nav-text">每日作业</div>
                </div>
                <div class="nav-item teachers" onclick="navigateTo('teachers')">
                    <span class="nav-icon">👨‍🏫</span>
                    <div class="nav-text">师资介绍</div>
                </div>
            </div>
        </div>

        <div class="features">
            <div class="features-title">✨ 我们的优势</div>
            <div class="feature-list">
                <div class="feature-item">
                    <div class="feature-icon">🎯</div>
                    <div>精准教学</div>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">👥</div>
                    <div>小班授课</div>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">📈</div>
                    <div>成绩提升</div>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">🏆</div>
                    <div>名师团队</div>
                </div>
            </div>
        </div>

        <div class="contact-section">
            <div class="contact-title">📞 联系我们</div>
            <div class="contact-info">
                <div class="contact-item">
                    <span class="contact-icon">📱</span>
                    电话：0571-XXXX-XXXX
                </div>
                <div class="contact-item">
                    <span class="contact-icon">📧</span>
                    邮箱：info@youjia.com
                </div>
                <div class="contact-item">
                    <span class="contact-icon">📍</span>
                    地址：杭州市西湖区XXX街道
                </div>
            </div>
        </div>

        <div class="footer">
            <p>© 2026 优佳辅导班 | 专业教学 · 用心服务</p>
        </div>
    </div>

    <script>
        function navigateTo(page) {
            const pages = {
                'schedule': 'pages/schedule.html',
                'courses': 'pages/courses.html',
                'homework': 'pages/homework.html',
                'teachers': 'pages/teachers.html'
            };
            if (pages[page]) {
                window.location.href = pages[page];
            }
        }

        // 添加页面加载完成后的动画
        window.addEventListener('load', function() {
            console.log('优佳辅导班H5页面已加载');
        });
    </script>
</body>
</html>
