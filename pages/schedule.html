<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>开课时间 - 优佳辅导班</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 30px;
            color: white;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .back-btn {
            font-size: 24px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .back-btn:hover {
            transform: scale(1.2);
        }

        .header-title {
            font-size: 24px;
            font-weight: 700;
        }

        .content {
            padding: 30px 20px;
        }

        .schedule-item {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            border-left: 5px solid #667eea;
            transition: all 0.3s ease;
        }

        .schedule-item:hover {
            transform: translateX(5px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.2);
        }

        .schedule-item.batch1 {
            border-left-color: #667eea;
        }

        .schedule-item.batch2 {
            border-left-color: #f093fb;
        }

        .schedule-item.batch3 {
            border-left-color: #4facfe;
        }

        .batch-name {
            font-size: 16px;
            font-weight: 700;
            color: #333;
            margin-bottom: 8px;
        }

        .schedule-detail {
            font-size: 14px;
            color: #666;
            line-height: 1.6;
        }

        .detail-row {
            display: flex;
            margin-bottom: 6px;
        }

        .detail-label {
            font-weight: 600;
            color: #667eea;
            min-width: 60px;
        }

        .detail-value {
            color: #333;
        }

        .footer {
            background: #f8f9fa;
            padding: 20px;
            text-align: center;
            color: #999;
            font-size: 12px;
            border-top: 1px solid #eee;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <span class="back-btn" onclick="goBack()">←</span>
            <div class="header-title">开课时间</div>
        </div>

        <div class="content">
            <div class="schedule-item batch1">
                <div class="batch-name">第一批次</div>
                <div class="schedule-detail">
                    <div class="detail-row">
                        <span class="detail-label">开课日期：</span>
                        <span class="detail-value">2026年7月1日</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">课程周期：</span>
                        <span class="detail-value">4周</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">上课时间：</span>
                        <span class="detail-value">周一至周五 9:00-11:30</span>
                    </div>
                </div>
            </div>

            <div class="schedule-item batch2">
                <div class="batch-name">第二批次</div>
                <div class="schedule-detail">
                    <div class="detail-row">
                        <span class="detail-label">开课日期：</span>
                        <span class="detail-value">2026年7月29日</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">课程周期：</span>
                        <span class="detail-value">4周</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">上课时间：</span>
                        <span class="detail-value">周一至周五 14:00-16:30</span>
                    </div>
                </div>
            </div>

            <div class="schedule-item batch3">
                <div class="batch-name">第三批次</div>
                <div class="schedule-detail">
                    <div class="detail-row">
                        <span class="detail-label">开课日期：</span>
                        <span class="detail-value">2026年8月26日</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">课程周期：</span>
                        <span class="detail-value">2周</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">上课时间：</span>
                        <span class="detail-value">周一至周五 10:00-12:30</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="footer">
            <p>报名咨询：请联系班主任</p>
        </div>
    </div>

    <script>
        function goBack() {
            window.location.href = '../index.html';
        }
    </script>
</body>
</html>
